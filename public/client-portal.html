<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
body{font-family:'Cairo',sans-serif;background:#070d1a;color:#e8eaf0;min-height:100vh;}
:root{
  --gold:#D4AF37;--gold-l:#E8C84A;--gold-dim:rgba(212,175,55,0.12);--gold-b:rgba(212,175,55,0.25);
  --bg:#070d1a;--bg2:#0B1320;--card:#0d1a2e;--card2:#112040;
  --b1:rgba(255,255,255,0.07);--b2:rgba(255,255,255,0.13);
  --t1:#e8eaf0;--t2:#8a9bb5;--t3:#4a5a72;
}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--gold-b);border-radius:4px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
@keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(212,175,55,0)}50%{box-shadow:0 0 24px 6px rgba(212,175,55,0.22)}}
.fu{animation:fadeUp .38s cubic-bezier(.22,1,.36,1) forwards;}
.fi{animation:fadeIn .3s ease forwards;}
.s1{animation-delay:.05s;opacity:0}.s2{animation-delay:.1s;opacity:0}.s3{animation-delay:.15s;opacity:0}.s4{animation-delay:.2s;opacity:0}
.spin{animation:spin 1s linear infinite;}
.glow{animation:glow 2.5s ease-in-out infinite;}
.skeleton{background:linear-gradient(90deg,var(--card) 25%,var(--card2) 50%,var(--card) 75%);background-size:400px 100%;animation:shimmer 1.4s ease-in-out infinite;border-radius:10px;}
input,textarea{font-family:'Cairo',sans-serif;outline:none;}
input:focus,textarea:focus{border-color:var(--gold)!important;}
input::placeholder,textarea::placeholder{color:var(--t3);}
textarea{resize:none;}
#toast{position:fixed;top:14px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--card2);border:1px solid var(--gold-b);color:var(--gold-l);padding:10px 20px;border-radius:14px;font-size:12px;font-weight:700;z-index:9999;transition:transform .3s cubic-bezier(.22,1,.36,1);white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.5);pointer-events:none;}
#toast.show{transform:translateX(-50%) translateY(0);}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;}
.b-active{background:rgba(34,197,94,.12);color:#22c55e;border:1px solid rgba(34,197,94,.25);}
.b-pending{background:rgba(245,158,11,.12);color:#f59e0b;border:1px solid rgba(245,158,11,.25);}
.b-closed{background:rgba(100,116,139,.15);color:#64748b;border:1px solid rgba(100,116,139,.2);}
.b-won{background:rgba(34,197,94,.12);color:#22c55e;border:1px solid rgba(34,197,94,.25);}
.b-lost{background:rgba(248,113,113,.12);color:#f87171;border:1px solid rgba(248,113,113,.25);}
.card-h{transition:border-color .2s,transform .15s;cursor:pointer;}
.card-h:active{transform:scale(.985);}
.tab-a{color:var(--gold-l);border-bottom:2px solid var(--gold);background:var(--gold-dim);}
.tab-i{color:var(--t2);border-bottom:2px solid transparent;}
.pin-key{width:70px;height:70px;border-radius:50%;background:var(--card2);border:1px solid var(--b2);color:var(--t1);font-size:22px;font-weight:900;font-family:'Cairo',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;user-select:none;-webkit-user-select:none;}
.pin-key:active{background:var(--gold-dim);border-color:var(--gold-b);transform:scale(.91);}
.pin-dot{width:13px;height:13px;border-radius:50%;border:2px solid var(--gold-b);transition:all .2s;}
.pin-dot.filled{background:var(--gold);border-color:var(--gold);box-shadow:0 0 8px rgba(212,175,55,.5);}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 70% 50% at 10% -10%,rgba(212,175,55,.06) 0%,transparent 60%),
  radial-gradient(ellipse 50% 40% at 90% 110%,rgba(96,165,250,.04) 0%,transparent 55%);}
#root{position:relative;z-index:1;}
</style>

// تنبيه: مفيش اتصال مباشر بـ Supabase من المتصفح هنا تاني.
// كل حاجة بتعدّي على Edge Function اسمها client-portal-api، وهي
// اللي بتتحقق من الـ PIN وتجيب البيانات على السيرفر، مش هنا.
// ⚙️  لو غيّرت الـ Supabase project، غيّر SUPABASE_PROJECT_REF بس هنا
const SUPABASE_PROJECT_REF = 'lrdshyohvymbdanoxgyy'; // ← غيّر هنا فقط
const FN_URL = `https://${SUPABASE_PROJECT_REF}.supabase.co/functions/v1/client-portal-api`;

async function callApi(action,payload={}){
  const r=await fetch(FN_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action,...payload})});
  const data=await r.json().catch(()=>({}));
  if(r.status===401){clearSession();window.location.reload();throw new Error(data.error||'الجلسة منتهية');}
  if(!r.ok)throw new Error(data.error||'حدث خطأ، حاول مرة أخرى');
  return data;
}

// ── Toast ──
function toast(msg,err=false){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.style.borderColor=err?'rgba(248,113,113,.4)':'rgba(212,175,55,.4)';
  el.style.color=err?'#f87171':'#E8C84A';
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),3000);
}

// ── Session (بتخزن توكن موقّع من السيرفر، مش الـ PIN ولا الـ ID مباشرة) ──
const SK='sanad_portal_v3';
function saveSession(token){localStorage.setItem(SK,JSON.stringify({token,ts:Date.now()}));}
function loadSession(){try{const s=JSON.parse(localStorage.getItem(SK)||'null');if(!s||!s.token)return null;if(Date.now()-s.ts>7*24*3600*1000){localStorage.removeItem(SK);return null;}return s;}catch{return null;}}
function clearSession(){localStorage.removeItem(SK);}

// ── Helpers ──
const fmtShort=d=>{if(!d)return'—';try{return new Date(d).toLocaleDateString('ar-EG',{year:'numeric',month:'short',day:'numeric'});}catch{return d;}};

  Logout:({s=18})=>svg("M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15m3 0 3-3m0 0-3-3m3 3H9",s),

// ════════════════════════
//  شاشة الدخول بـ PIN
// ════════════════════════
function LoginScreen({onLogin}){
  const [phone,setPhone]=useState('');
  const [step,setStep]=useState('phone');
  const [pin,setPin]=useState('');
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState('');
  const [found,setFound]=useState(null);

  const findClient=async()=>{
    if(!phone.trim()){setErr('أدخل رقم هاتفك');return;}
    setLoading(true);setErr('');
    try{
      const res=await callApi('find',{contact:phone.trim()});
      setFound({client_name:res.client_name});
      setStep('pin');
    }catch(e){
      setErr(e.message||'لم يُعثر على حساب بهذا الرقم');
    }
    setLoading(false);
  };

  const checkPin=async()=>{
    if(!found||!pin.trim())return;
    try{
      const res=await callApi('verify',{contact:phone.trim(),pin:pin.trim()});
      saveSession(res.token);
      onLogin(res.client,res.token);
    } catch(e) {
      setErr(e.message||'رمز الدخول غير صحيح ❌');
      setPin('');
      setTimeout(()=>setErr(''),2500);

      React.createElement('label',{style:{display:'block',fontSize:'11px',fontWeight:700,color:'var(--t2)',marginBottom:'8px'}},'رمز الدخول'),
      React.createElement('div',{style:{position:'relative'}},
        React.createElement('input',{
          type:showPin?'text':'password',
          value:pin,
          onChange:e=>setPin(e.target.value),
          onKeyDown:e=>e.key==='Enter'&&checkPin(),
          placeholder:'أدخل الرمز...',
          autoFocus:true,
          style:{width:'100%',padding:'13px 44px 13px 14px',fontSize:'16px',background:'var(--bg2)',border:'1px solid var(--b2)',borderRadius:'12px',color:'var(--t1)',direction:'ltr',textAlign:'left',letterSpacing:'2px'}
        }),

  return React.createElement('div',{style:{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'24px'}},

        React.createElement('svg',{width:48,height:48,viewBox:'0 0 40 40'},

            React.createElement('circle',{cx:'6',cy:'13',r:'4.5',fill:'#D4AF37'}),

      React.createElement('h1',{style:{fontSize:'20px',fontWeight:900,color:'var(--t1)',marginBottom:'5px'}},'بوابة الموكل'),
      React.createElement('p',{style:{fontSize:'11px',color:'var(--t2)',display:'flex',alignItems:'center',justifyContent:'center',gap:'5px'}},
        React.createElement(Ic.Shield,{s:13}),'سَنَد'
      )

    React.createElement('div',{className:"fu s1",style:{width:'100%',maxWidth:'340px',background:'var(--card)',border:'1px solid var(--b2)',borderRadius:'24px',padding:'28px',boxShadow:'0 20px 60px rgba(0,0,0,.5)'}},

        loading?React.createElement(Ic.Spin):'التالي ←'
      ),
      React.createElement('p',{style:{textAlign:'center',marginTop:'16px',fontSize:'10px',color:'var(--t3)'}},'🔒 منصة مؤمّنة — بياناتك في أمان تام')
    )
  );
}

// ════════════════════════
//  جلسة واحدة (Timeline)
// ════════════════════════
function SessionCard({s,isLast}){
  const today=new Date().toISOString().slice(0,10);
  const up=s.session_date>today,td=s.session_date===today;
  const col=td?'#f59e0b':up?'#60a5fa':'#22c55e';
  return React.createElement('div',{style:{display:'flex',gap:'12px',paddingBottom:isLast?0:'18px'}},
    React.createElement('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',paddingTop:'3px'}},
      React.createElement('div',{style:{width:'10px',height:'10px',borderRadius:'50%',background:col,border:'2px solid var(--bg)',boxShadow:`0 0 0 3px ${col}33`,flexShrink:0}}),
      !isLast&&React.createElement('div',{style:{width:'2px',flex:1,background:'linear-gradient(to bottom,rgba(212,175,55,.3),transparent)',marginTop:'4px',minHeight:'28px'}})
    ),

      callApi('getClient',{token:s.token}).then(({data})=>{
        if(data){setClient(data);setToken(s.token);setState('portal');}
        else{clearSession();setState('login');}
      }).catch(()=>{clearSession();setState('login');});
    } else setState('login');
  },[]);
  if(state==='loading')return React.createElement('div',{style:{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:'14px'}},
    React.createElement('div',{style:{width:'56px',height:'56px',borderRadius:'16px',background:'#0B1320',display:'flex',alignItems:'center',justifyContent:'center',border:'1px solid rgba(212,175,55,0.2)'}},
      React.createElement('svg',{width:38,height:38,viewBox:'0 0 40 40'},
          React.createElement('line',{x1:'6',y1:'13',x2:'34',y2:'13',stroke:'#D4AF37',strokeWidth:'4.5',strokeLinecap:'round'}),
          React.createElement('line',{x1:'9.5',y1:'21',x2:'34',y2:'21',stroke:'#D4AF37',strokeWidth:'4.5',strokeLinecap:'round'}),
          React.createElement('line',{x1:'13',y1:'29',x2:'34',y2:'29',stroke:'#D4AF37',strokeWidth:'4.5',strokeLinecap:'round'}),
          React.createElement('line',{x1:'6',y1:'13',x2:'6',y2:'32',stroke:'#D4AF37',strokeWidth:'4.5',strokeLinecap:'round'}),
          React.createElement('circle',{cx:'6',cy:'13',r:'4.5',fill:'#D4AF37'})
      )
    ),
    React.createElement(Ic.Spin),
    React.createElement('p',{style:{fontSize:'11px',color:'var(--t3)'}},'جاري التحقق...')
  );
  if(state==='login')return React.createElement(LoginScreen,{onLogin:(cl,tok)=>{setClient(cl);setToken(tok);setState('portal');}});
  return React.createElement(Portal,{client,token});
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
